<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB Finance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f0f4ff;min-height:100vh;padding-bottom:85px;}

/* HEADER */
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);padding:22px 18px 28px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.08);}
.header::after{content:'';position:absolute;bottom:-30px;left:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.06);}
.header h1{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:1px;position:relative;}
.header p{color:rgba(255,255,255,0.7);font-size:0.72rem;margin-top:2px;position:relative;}
.mes-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 18px 6px;position:relative;}
.mes-btn{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);color:#fff;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;backdrop-filter:blur(8px);}
.mes-label{font-size:0.95rem;font-weight:700;color:#fff;min-width:155px;text-align:center;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8ecff;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(102,126,234,0.12);}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:#bbb;font-size:0.52rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:0.3px;transition:all 0.2s;}
.nav-btn .nav-icon{font-size:1.05rem;}
.nav-btn.active{color:#667eea;}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 4px #667eea88);}

.panel{display:none;padding:14px;animation:fadeIn 0.25s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.stat-card{background:#fff;border-radius:18px;padding:16px 14px;box-shadow:0 2px 16px rgba(102,126,234,0.09);}
.stat-card.full{grid-column:1/-1;}
.sc-label{font-size:0.6rem;color:#aaa;margin-bottom:5px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600;}
.sc-val{font-size:1.35rem;font-weight:900;}
.sc-sub{font-size:0.63rem;color:#aaa;margin-top:3px;font-weight:500;}
.sc-green{color:#10b981;} .sc-red{color:#ef4444;} .sc-purple{color:#667eea;} .sc-orange{color:#f59e0b;}

/* SECTION */
.section{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 16px rgba(102,126,234,0.08);}
.section h3{font-size:0.65rem;color:#aaa;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px;font-weight:700;}

/* DONA */
.dona-wrap{text-align:center;}
.dona-container{position:relative;width:155px;height:155px;margin:0 auto 14px;}
.dona-container canvas{width:155px!important;height:155px!important;}
.dona-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.dona-center .dc-val{font-size:0.95rem;font-weight:900;color:#1e1b4b;}
.dona-center .dc-lbl{font-size:0.55rem;color:#aaa;font-weight:600;}
.dona-legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.63rem;color:#777;font-weight:500;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* BARS */
.bar-row{margin-bottom:10px;}
.bar-label{display:flex;justify-content:space-between;font-size:0.68rem;margin-bottom:4px;font-weight:600;color:#555;}
.bar-track{height:8px;background:#f1f3ff;border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(.4,0,.2,1),background 0.3s;}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
.fg input,.fg select,.fg-full,.inp{background:#f7f8ff;border:1.5px solid #e8ecff;border-radius:11px;padding:10px 13px;color:#1e1b4b;font-size:0.76rem;outline:none;width:100%;font-family:'Inter',sans-serif;font-weight:500;}
.fg input:focus,.fg select:focus,.fg-full:focus,.inp:focus{border-color:#667eea;background:#fff;}
.fg input::placeholder,.fg-full::placeholder,.inp::placeholder{color:#c4c9e8;}
.fg select option{background:#fff;color:#1e1b4b;}
.fg-full{margin-bottom:9px;}
.lbl{font-size:0.6rem;color:#aaa;font-weight:700;letter-spacing:0.5px;margin-bottom:3px;text-transform:uppercase;}

.btn-primary{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,0.35);transition:all 0.2s;font-family:'Inter',sans-serif;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,0.45);}
.btn-sm{padding:10px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;}
.btn-save{padding:10px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}

/* TAGS */
.empty-state{text-align:center;color:#ccc;font-size:0.74rem;padding:22px 0;font-weight:500;}

/* TIPO TOGGLE */
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.tipo-btn{padding:11px;border:2px solid #e8ecff;border-radius:12px;background:#f7f8ff;color:#aaa;font-weight:700;font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
.tipo-btn.ingreso.active{border-color:#10b981;color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);}
.tipo-btn.gasto.active{border-color:#ef4444;color:#ef4444;background:linear-gradient(135deg,#fef2f2,#fee2e2);}

/* FILTER */
.list-filters{display:flex;gap:6px;margin-bottom:10px;}
.filter-btn{padding:5px 12px;border-radius:99px;border:1.5px solid #e8ecff;background:#f7f8ff;color:#aaa;font-size:0.65rem;cursor:pointer;font-weight:700;transition:all 0.2s;}
.filter-btn.active{border-color:#667eea;color:#667eea;background:linear-gradient(135deg,#eef2ff,#e0e7ff);}

/* TX ITEM */
.tx-item{background:#f7f8ff;border-radius:14px;padding:12px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;border:1.5px solid #f0f2ff;}
.tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.tx-icon.ing{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
.tx-icon.gas{background:linear-gradient(135deg,#fee2e2,#fecaca);}
.tx-info{flex:1;min-width:0;}
.tx-desc{font-size:0.78rem;font-weight:700;color:#1e1b4b;}
.tx-meta{font-size:0.6rem;color:#aaa;margin-top:1px;font-weight:500;}
.tx-amt{font-size:0.86rem;font-weight:800;flex-shrink:0;}
.tx-del{background:transparent;border:none;color:#ddd;font-size:0.85rem;cursor:pointer;padding:3px;}
.tx-del:hover{color:#ef4444;}

/* CARD VISUAL */
.card-visual{border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;min-height:120px;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.card-visual.visa{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);}
.card-visual.master{background:linear-gradient(135deg,#c0392b 0%,#8e0000 50%,#c0392b 100%);}
.card-visual.amex{background:linear-gradient(135deg,#134e5e 0%,#71b280 100%);}
.card-visual::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.06);}
.card-visual::after{content:'';position:absolute;right:30px;bottom:-50px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.04);}
.card-name{font-size:0.62rem;letter-spacing:2px;opacity:0.75;margin-bottom:3px;color:#fff;font-weight:600;}
.card-bank{font-size:0.58rem;opacity:0.45;margin-bottom:10px;color:#fff;}
.card-spent{font-size:1.5rem;font-weight:900;margin-bottom:2px;color:#fff;}
.card-avail{font-size:0.72rem;opacity:0.8;color:#fff;font-weight:500;}
.card-badge{position:absolute;top:14px;right:14px;font-size:0.58rem;font-weight:800;padding:4px 11px;border-radius:99px;background:rgba(255,255,255,0.15);color:#fff;letter-spacing:1px;border:1px solid rgba(255,255,255,0.2);}

/* ALERT */
.alert-box{padding:10px 13px;border-radius:12px;font-size:0.73rem;margin-bottom:11px;display:none;font-weight:600;align-items:center;gap:7px;}
.alert-box.warning{background:#fffbeb;border:1.5px solid #f59e0b;color:#d97706;display:flex;}
.alert-box.danger{background:#fef2f2;border:1.5px solid #ef4444;color:#dc2626;display:flex;}

/* SUM ROW */
.sum-row{display:flex;justify-content:space-between;background:#f7f8ff;border-radius:11px;padding:10px 13px;margin-bottom:7px;font-size:0.74rem;border:1.5px solid #f0f2ff;}
.sum-row span:last-child{font-weight:700;color:#1e1b4b;}

/* SUBTABS */
.subtabs{display:flex;gap:7px;margin-bottom:13px;}
.subtab{flex:1;padding:9px 4px;border-radius:12px;background:#f7f8ff;font-size:0.65rem;font-weight:700;cursor:pointer;color:#aaa;transition:all 0.2s;border:1.5px solid #eef0ff;}
.subtab.visa.active{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border-color:#0f3460;box-shadow:0 4px 14px rgba(15,52,96,0.3);}
.subtab.master.active{background:linear-gradient(135deg,#c0392b,#8e0000);color:#fff;border-color:#8e0000;box-shadow:0 4px 14px rgba(192,57,43,0.35);}
.subtab.amex.active{background:linear-gradient(135deg,#134e5e,#71b280);color:#fff;border-color:#134e5e;box-shadow:0 4px 14px rgba(19,78,94,0.3);}

/* CAT CHIP */
.cat-chip{font-size:0.55rem;padding:2px 7px;border-radius:99px;font-weight:700;white-space:nowrap;}

/* EXPENSE ITEM */
.expense-item{background:#f7f8ff;border-radius:13px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:8px;border:1.5px solid #eef0ff;}
.expense-info{flex:1;min-width:0;}
.expense-top{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap;}
.expense-desc{font-size:0.78rem;font-weight:700;color:#1e1b4b;}
.expense-dates{font-size:0.6rem;color:#bbb;font-weight:500;}
.expense-amt{font-size:0.85rem;font-weight:800;flex-shrink:0;color:#1e1b4b;}
.btn-del{background:#fee2e2;border:none;color:#ef4444;border-radius:7px;padding:4px 9px;font-size:0.64rem;cursor:pointer;font-weight:700;}

/* G CARDS */
.g-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.g-card{border-radius:14px;padding:13px 10px;text-align:center;}
.g-card.visa{background:linear-gradient(135deg,#1a1a2e,#16213e);box-shadow:0 4px 14px rgba(15,52,96,0.25);}
.g-card.master{background:linear-gradient(135deg,#c0392b,#8e0000);box-shadow:0 4px 14px rgba(192,57,43,0.25);}
.g-card.amex{background:linear-gradient(135deg,#134e5e,#71b280);box-shadow:0 4px 14px rgba(19,78,94,0.25);}
.gc-name{font-size:0.55rem;letter-spacing:1px;color:rgba(255,255,255,0.6);margin-bottom:5px;font-weight:700;}
.gc-spent{font-size:0.88rem;font-weight:900;margin-bottom:2px;color:#fff;}
.gc-pct{font-size:0.58rem;color:rgba(255,255,255,0.55);font-weight:600;}
.gc-bar{height:4px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;margin-top:6px;}
.gc-fill{height:100%;border-radius:99px;}

/* PRES ITEM */
.pres-item{background:#f7f8ff;border-radius:14px;padding:14px;margin-bottom:9px;border:1.5px solid #eef0ff;}
.pres-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.pres-del{background:#fee2e2;border:none;color:#ef4444;border-radius:7px;padding:3px 8px;font-size:0.64rem;cursor:pointer;font-weight:700;}

/* DEUDA ITEM */
.deuda-item{background:#fff;border-radius:18px;padding:16px;margin-bottom:11px;box-shadow:0 2px 16px rgba(102,126,234,0.09);border:1.5px solid #f0f2ff;}
.deuda-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.deuda-name{font-size:0.92rem;font-weight:800;color:#1e1b4b;}
.deuda-badge{font-size:0.6rem;padding:4px 10px;border-radius:99px;font-weight:700;}
.deuda-badge.activa{background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca;}
.deuda-badge.pagada{background:#ecfdf5;color:#10b981;border:1.5px solid #a7f3d0;}
.deuda-amounts{display:flex;justify-content:space-between;font-size:0.68rem;color:#aaa;margin-bottom:9px;font-weight:500;}
.deuda-track{height:11px;background:#f1f3ff;border-radius:99px;overflow:hidden;margin-bottom:11px;}
.deuda-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.deuda-actions{display:flex;gap:8px;}
.btn-abono{flex:1;padding:9px;border:2px solid #667eea;border-radius:10px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#667eea;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-del-deuda{padding:9px 13px;border:2px solid #fecaca;border-radius:10px;background:#fef2f2;color:#ef4444;font-size:0.72rem;cursor:pointer;font-weight:700;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,27,75,0.55);z-index:100;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:22px;padding:24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(102,126,234,0.25);}
.modal h3{font-size:1rem;font-weight:800;color:#1e1b4b;margin-bottom:14px;}
.modal input{width:100%;background:#f7f8ff;border:1.5px solid #e8ecff;border-radius:11px;padding:11px 13px;color:#1e1b4b;font-size:0.78rem;outline:none;margin-bottom:10px;font-family:'Inter',sans-serif;font-weight:500;}
.modal input:focus{border-color:#667eea;}
.modal input::placeholder{color:#c4c9e8;}
.modal-btns{display:flex;gap:9px;margin-top:4px;}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:11px;font-weight:700;font-size:0.8rem;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel{background:#f7f8ff;color:#aaa;border:1.5px solid #e8ecff;}
.btn-ok{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 14px rgba(102,126,234,0.35);}

/* GRADIENT BADGES */
.badge-ing{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#10b981;border:1.5px solid #a7f3d0;border-radius:99px;font-size:0.62rem;font-weight:700;padding:3px 9px;}
.badge-gas{background:linear-gradient(135deg,#fef2f2,#fee2e2);color:#ef4444;border:1.5px solid #fecaca;border-radius:99px;font-size:0.62rem;font-weight:700;padding:3px 9px;}
</style>
</head>
<body>

<div class="header">
  <h1>💰 LAB Finance</h1>
  <p>Control Financiero Personal · COP</p>
  <div class="mes-bar">
    <button class="mes-btn" onclick="changeMes(-1)">‹</button>
    <div class="mes-label" id="mes-label">—</div>
    <button class="mes-btn" onclick="changeMes(1)">›</button>
  </div>
</div>

<div id="panel-resumen" class="panel active"></div>
<div id="panel-flujo" class="panel"></div>
<div id="panel-tarjetas" class="panel"></div>
<div id="panel-presupuesto" class="panel"></div>
<div id="panel-deudas" class="panel"></div>

<nav class="bottom-nav">
  <button class="nav-btn active"  onclick="switchTab('resumen')"><span class="nav-icon">📊</span>RESUMEN</button>
  <button class="nav-btn"         onclick="switchTab('flujo')"><span class="nav-icon">💸</span>FLUJO</button>
  <button class="nav-btn"         onclick="switchTab('tarjetas')"><span class="nav-icon">💳</span>TARJETAS</button>
  <button class="nav-btn"         onclick="switchTab('presupuesto')"><span class="nav-icon">🎯</span>PRESUPUESTO</button>
  <button class="nav-btn"         onclick="switchTab('deudas')"><span class="nav-icon">🏦</span>DEUDAS</button>
</nav>

<div class="modal-overlay" id="modal-abono">
  <div class="modal">
    <h3>💳 Registrar Abono</h3>
    <input type="number" id="abono-monto" placeholder="Monto del abono COP">
    <input type="text"   id="abono-desc"  placeholder="Descripción (opcional)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAbono()">Cancelar</button>
      <button class="btn-ok"     onclick="confirmAbono()">Abonar</button>
    </div>
  </div>
</div>

<script>
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CARDS=['visa','master','amex'];
const CARD_NAMES={visa:'VISA CLÁSICA',master:'MASTERCARD ORO',amex:'AMEX GREEN'};
const CARD_BADGE={visa:'VISA',master:'ORO',amex:'AMEX'};
const CARD_COLORS={visa:'#60a5fa',master:'#fca5a5',amex:'#6ee7b7'};

const CATS_GASTO=[
  {id:'arriendo',label:'🏠 Arriendo',color:'#f472b6'},
  {id:'mercado',label:'🛒 Mercado',color:'#fbbf24'},
  {id:'comida',label:'🍔 Comida',color:'#f97316'},
  {id:'transporte',label:'🚗 Transporte',color:'#3b82f6'},
  {id:'salud',label:'💊 Salud',color:'#10b981'},
  {id:'ocio',label:'🎮 Ocio',color:'#8b5cf6'},
  {id:'servicios',label:'💡 Servicios',color:'#06b6d4'},
  {id:'ropa',label:'👗 Ropa',color:'#ec4899'},
  {id:'mascotas',label:'🐾 Mascotas',color:'#f59e0b'},
  {id:'negocio',label:'💼 Negocio',color:'#6366f1'},
  {id:'otro',label:'📦 Otro',color:'#94a3b8'},
];
const CATS_INGRESO=[
  {id:'freelance',label:'💼 Freelance',color:'#8b5cf6'},
  {id:'agencia',label:'🏢 Agencia',color:'#3b82f6'},
  {id:'redes',label:'📱 Redes Soc.',color:'#10b981'},
  {id:'otro_ing',label:'💰 Otro',color:'#f59e0b'},
];
const CATS_TC=[
  {id:'comida',label:'🍔 Comida',color:'#f97316'},
  {id:'transporte',label:'🚗 Transporte',color:'#3b82f6'},
  {id:'salud',label:'💊 Salud',color:'#10b981'},
  {id:'ropa',label:'👗 Ropa',color:'#ec4899'},
  {id:'entretenimiento',label:'🎮 Entretenimiento',color:'#8b5cf6'},
  {id:'servicios',label:'💡 Servicios',color:'#06b6d4'},
  {id:'negocio',label:'💼 Negocio',color:'#6366f1'},
  {id:'viajes',label:'✈️ Viajes',color:'#0ea5e9'},
  {id:'mascotas',label:'🐾 Mascotas',color:'#f59e0b'},
  {id:'otro',label:'📦 Otro',color:'#94a3b8'},
];

const now=new Date();
let curMes=now.getMonth(),curAnio=now.getFullYear();
let curTipo='ingreso',txFilter='todos',curCard='visa',abonoDeudaId=null;
let state={txs:[],presupuestos:[],deudas:[],cards:{}};

const txKey=()=>`lf_tx_${curAnio}_${curMes}`;
const presKey=()=>`lf_pres_${curAnio}_${curMes}`;
const cardKey=c=>`lf_card_${c}_${curAnio}_${curMes}`;
const cfgKey=c=>`lf_cfg_${c}`;
const deudasKey=()=>`lf_deudas`;

async function loadAll(){
  state={txs:[],presupuestos:[],deudas:[],cards:{}};
  try{const r=await window.storage.get(txKey());if(r)state.txs=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get(presKey());if(r)state.presupuestos=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get(deudasKey());if(r)state.deudas=JSON.parse(r.value);}catch(e){}
  if(!Array.isArray(state.deudas))state.deudas=[];
  for(const c of CARDS){
    state.cards[c]={limit:0,tope:0,expenses:[]};

function renderResumen(){
  const ing=state.txs.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+t.monto,0);
  const gas=state.txs.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+t.monto,0);
  const bal=ing-gas;
  const rb=document.getElementById('r-balance');if(!rb)return;
  rb.textContent=fmt(bal);rb.className='sc-val '+(bal>=0?'sc-green':'sc-red');
  document.getElementById('r-bal-sub').textContent=bal>=0?'✅ Vas bien este mes':'⚠️ Gastas más de lo que ingresas';
  document.getElementById('r-ing').textContent=fmt(ing);
  document.getElementById('r-gas').textContent=fmt(gas);
  const mx=Math.max(ing,gas,1);
  document.getElementById('r-ing-b').style.width=Math.round((ing/mx)*100)+'%';
  document.getElementById('r-gas-b').style.width=Math.round((gas/mx)*100)+'%';
  document.getElementById('r-ing-v').textContent=fmt(ing);
  document.getElementById('r-gas-v').textContent=fmt(gas);
  drawDona(gas);
  CARDS.forEach(c=>{
    const d=state.cards[c],t=d.expenses.reduce((s,e)=>s+e.monto,0);
    const p=d.limit>0?Math.min((t/d.limit)*100,100):0;
    document.getElementById('gs-'+c).textContent=fmt(t);
    document.getElementById('gp-'+c).textContent=d.limit>0?Math.round(p)+'% usado':'sin límite';
    document.getElementById('gf-'+c).style.width=p+'%';
  });
  const ge=document.getElementById('g-estado');if(!ge)return;
  ge.innerHTML=CARDS.map(c=>{
    const d=state.cards[c],t=d.expenses.reduce((s,e)=>s+e.monto,0);
    const avail=d.limit>0?Math.max(d.limit-t,0):null;
    let sc='#10b981',st='OK';
    if(d.limit>0){const p=(t/d.limit)*100;if(p>=100){sc='#ef4444';st='SUPERADO';}else if((d.tope>0&&t>=d.tope)||p>=70){sc='#f59e0b';st='ALERTA';}}
    return`<div class="sum-row"><span style="color:#555;font-weight:600">${CARD_NAMES[c]}</span><span style="color:#1e1b4b">${fmt(t)}</span><span style="color:#aaa;font-size:0.68rem">${avail!==null?'Disp: '+fmt(avail):'—'}</span><span style="color:${sc};font-size:0.63rem;font-weight:800">${st}</span></div>`;
  }).join('');
}

function drawDona(totalGas){
  const canvas=document.getElementById('dona-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');canvas.width=155;canvas.height=155;ctx.clearRect(0,0,155,155);
  document.getElementById('dc-val').textContent=fmt(totalGas);
  const catT={};state.txs.filter(t=>t.tipo==='gasto').forEach(t=>{catT[t.cat]=(catT[t.cat]||0)+t.monto;});
  const entries=Object.entries(catT).sort((a,b)=>b[1]-a[1]);
  if(!entries.length||!totalGas){
    ctx.beginPath();ctx.arc(77,77,65,0,Math.PI*2);ctx.fillStyle='#f1f3ff';ctx.fill();
    ctx.beginPath();ctx.arc(77,77,38,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    document.getElementById('dona-legend').innerHTML='<span style="color:#ddd;font-size:0.7rem">Sin gastos aún</span>';return;
  }
  let sa=-Math.PI/2;const leg=[];
  entries.forEach(([id,amt])=>{
    const ci=catInfo(id),sl=(amt/totalGas)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(77,77);ctx.arc(77,77,68,sa,sa+sl);ctx.closePath();ctx.fillStyle=ci.color;ctx.fill();
    sa+=sl;leg.push(`<div class="legend-item"><div class="legend-dot" style="background:${ci.color}"></div>${ci.label}</div>`);
  });
  // inner shadow ring
  ctx.beginPath();ctx.arc(77,77,40,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  document.getElementById('dona-legend').innerHTML=leg.join('');
}

function renderCardPanel(card){
  const d=state.cards[card];
  const total=d.expenses.reduce((s,e)=>s+e.monto,0);
  const avail=d.limit-total,pct=d.limit>0?Math.min((total/d.limit)*100,100):0;
  const sp=document.getElementById('tc-spent');if(!sp)return;
  sp.textContent=fmt(total);
  document.getElementById('tc-avail').textContent=d.limit>0?'Disponible: '+fmt(Math.max(avail,0)):'Configura tu límite';
  document.getElementById('tc-lim').textContent=d.limit>0?fmt(d.limit):'— COP';
  document.getElementById('tc-tope').textContent=d.tope>0?fmt(d.tope):'— COP';
  let grad='linear-gradient(90deg,#10b981,#34d399)';
  if(pct>=100)grad='linear-gradient(90deg,#ef4444,#f87171)';
  else if((d.tope>0&&total>=d.tope)||pct>=70)grad='linear-gradient(90deg,#f59e0b,#fbbf24)';
  const bar=document.getElementById('tc-bar');bar.style.width=pct+'%';bar.style.background=grad;
  document.getElementById('tc-pct').textContent=Math.round(pct)+'%';
  const al=document.getElementById('tc-alert');al.className='alert-box';al.style.display='none';
  if(total>=d.limit&&d.limit>0){al.className='alert-box danger';al.style.display='flex';al.innerHTML='🚨 ¡LÍMITE SUPERADO! Gastado '+fmt(total)+' de '+fmt(d.limit);}
  else if(d.tope>0&&total>=d.tope){al.className='alert-box warning';al.style.display='flex';al.innerHTML='⚠️ Tope de alerta alcanzado. Gastado: '+fmt(total);}
  const catT={};d.expenses.forEach(e=>{catT[e.cat]=(catT[e.cat]||0)+e.monto;});
  const catsEl=document.getElementById('tc-cats');
  const entries=Object.entries(catT).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){catsEl.innerHTML='<div class="empty-state">Sin datos aún</div>';}
  else{const mx=entries[0][1];catsEl.innerHTML=entries.map(([id,amt])=>{
    const ci=catInfo(id),w=Math.round((amt/total)*100);
    return`<div class="bar-row"><div class="bar-label"><span>${ci.label}</span><span style="color:${ci.color}">${fmt(amt)} <span style="color:#ccc">${w}%</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((amt/mx)*100)}%;background:${ci.color}"></div></div></div>`;
  }).join('');}
  const listEl=document.getElementById('tc-list');
  if(!d.expenses.length){listEl.innerHTML='<div class="empty-state">Sin gastos este mes</div>';return;}
  listEl.innerHTML=[...d.expenses].reverse().map(e=>{
    const ci=catInfo(e.cat);
    return`<div class="expense-item">
      <div class="expense-info">
        <div class="expense-top"><span class="expense-desc">${e.desc}</span><span class="cat-chip" style="background:${ci.color}20;color:${ci.color};border:1.5px solid ${ci.color}40">${ci.label}</span></div>
        <div class="expense-dates">${e.fg?'📅 '+e.fg:''}${e.fp?' · 💳 Pago: '+e.fp:''}</div>
      </div>
      <span class="expense-amt">${fmt(e.monto)}</span>
      <button class="btn-del" onclick="deleteTCExpense('${card}',${e.id})">✕</button>
    </div>`;
  }).join('');
}

function addPres(){

  if(ex)ex.limite=monto;else state.presupuestos.push({id:Date.now(),cat,limite:monto});
  sv(presKey(),state.presupuestos);renderPres();document.getElementById('p-monto').value='';
}

function renderPres(){
  const el=document.getElementById('pres-list');if(!el)return;
  if(!state.presupuestos.length){el.innerHTML='<div class="empty-state">Sin presupuestos configurados</div>';return;}

    const ci=catInfo(p.cat);
    const gastado=state.txs.filter(t=>t.tipo==='gasto'&&t.cat===p.cat).reduce((s,t)=>s+t.monto,0);
    const pct=Math.min((gastado/p.limite)*100,100);
    let col='#10b981',grad='linear-gradient(90deg,#10b981,#34d399)';
    if(pct>=100){col='#ef4444';grad='linear-gradient(90deg,#ef4444,#f87171)';}
    else if(pct>=70){col='#f59e0b';grad='linear-gradient(90deg,#f59e0b,#fbbf24)';}
    return`<div class="pres-item">
      <div class="pres-top">
        <div><span style="font-size:0.82rem;font-weight:700;color:#1e1b4b">${ci.label}</span><br><span style="font-size:0.68rem;color:#aaa">${fmt(gastado)} / ${fmt(p.limite)}</span></div>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:0.68rem;font-weight:800;color:${col}">${Math.round(pct)}%</span><button class="pres-del" onclick="deletePres(${p.id})">✕</button></div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${grad}"></div></div>
    </div>`;
  }).join('');
}

function addDeuda(){
  const nombre=document.getElementById('d-nombre').value.trim(),total=parseFloat(document.getElementById('d-total').value);
  if(!nombre){alert('Ingresa el nombre');return;}if(!total||total<=0){alert('Ingresa un monto');return;}
  state.deudas.push({id:Date.now(),nombre,total,abonos:[]});
  sv(deudasKey(),state.deudas);renderDeudas();
  document.getElementById('d-nombre').value='';document.getElementById('d-total').value='';
}
function deleteDeuda(id){state.deudas=state.deudas.filter(d=>d.id!==id);sv(deudasKey(),state.deudas);renderDeudas();}
function openAbono(id){abonoDeudaId=id;document.getElementById('abono-monto').value='';document.getElementById('abono-desc').value='';document.getElementById('modal-abono').classList.add('open');}
function closeAbono(){document.getElementById('modal-abono').classList.remove('open');abonoDeudaId=null;}
function confirmAbono(){
  const monto=parseFloat(document.getElementById('abono-monto').value),desc=document.getElementById('abono-desc').value.trim();
  if(!monto||monto<=0){alert('Ingresa un monto válido');return;}
  const d=state.deudas.find(x=>x.id===abonoDeudaId);
  if(d)d.abonos.push({id:Date.now(),monto,desc,fecha:new Date().toISOString().slice(0,10)});
  sv(deudasKey(),state.deudas);closeAbono();renderDeudas();
}
function renderDeudas(){
  const el=document.getElementById('deudas-list');if(!el)return;
  if(!state.deudas.length){el.innerHTML='<div class="empty-state" style="padding:30px 0">¡Sin deudas registradas! 🎉</div>';return;}
  el.innerHTML=state.deudas.map(d=>{
    const pagado=d.abonos.reduce((s,a)=>s+a.monto,0),pct=Math.min((pagado/d.total)*100,100),pend=Math.max(d.total-pagado,0),pagada=pct>=100;
    let grad=pagada?'linear-gradient(90deg,#10b981,#34d399)':pct>=50?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#667eea,#764ba2)';
    return`<div class="deuda-item">
      <div class="deuda-header"><span class="deuda-name">${d.nombre}</span><span class="deuda-badge ${pagada?'pagada':'activa'}">${pagada?'✅ PAGADA':'EN CURSO'}</span></div>
      <div class="deuda-amounts">
        <span>Pagado: <b style="color:#10b981">${fmt(pagado)}</b></span>
        <span>Pendiente: <b style="color:#ef4444">${fmt(pend)}</b></span>
        <span>Total: <b style="color:#1e1b4b">${fmt(d.total)}</b></span>
      </div>
      <div style="font-size:0.66rem;color:#aaa;font-weight:600;margin-bottom:5px">${Math.round(pct)}% pagado</div>
      <div class="deuda-track"><div class="deuda-fill" style="width:${pct}%;background:${grad}"></div></div>
      ${!pagada?`<div class="deuda-actions"><button class="btn-abono" onclick="openAbono(${d.id})">+ Registrar Abono</button><button class="btn-del-deuda" onclick="deleteDeuda(${d.id})">✕</button></div>`:`<div style="text-align:center;font-size:0.72rem;color:#10b981;font-weight:700;padding-top:2px">¡Deuda liquidada! 🎉</div>`}
    </div>`;
  }).join('');
}

loadAll();
</script>
